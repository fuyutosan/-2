<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕事カウンター v13</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f0eb;padding:16px;min-height:100vh}
.app{max-width:400px;margin:0 auto}

/* ── トップバー ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
.dt{font-size:12px;color:#888}
.xp-bg{height:4px;background:#ddd;border-radius:2px;overflow:hidden;margin-bottom:1rem}
.xp-f{height:100%;background:#378ADD;border-radius:2px;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ── 累計 + 抱えてる ── */
.summary-row{display:flex;gap:10px;margin-bottom:1rem}
.summary-card{background:#fff;border-radius:12px;padding:12px 16px;flex:1;border:0.5px solid #ddd}
.summary-num{font-size:36px;font-weight:600;color:#111;line-height:1}
.summary-sub{font-size:11px;color:#888;margin-top:3px}
.summary-today{font-size:20px;font-weight:600;color:#1D9E75}

/* ── 3カード ── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:12px 8px;text-align:center;display:flex;flex-direction:column;gap:7px}
.card-name{font-size:12px;color:#888}
.card-num{font-size:40px;font-weight:600;line-height:1;color:#111}
.card-num.zero{color:#ccc}
.cbtn{width:100%;padding:8px 0;border:0.5px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:500;background:#f0f0ec;color:#333}
.cbtn:disabled{opacity:.25;cursor:default}
.cbtn:active:not(:disabled){transform:scale(.96)}
.btn-add:hover:not(:disabled){background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.btn-next:hover:not(:disabled){background:#E6F1FB;color:#185FA5;border-color:#B5D4F4}
.btn-done{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97}
.btn-done:hover:not(:disabled){background:#C0DD97;color:#27500A}

.divider{height:0.5px;background:#ddd;margin:1.25rem 0}
.sec-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}

/* ── キャラ ── */
.char-card{background:#eeeee8;border-radius:12px;padding:14px;margin-bottom:1rem;display:flex;align-items:center;gap:14px}
.char-img{width:88px;height:88px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.char-stage-lbl{font-size:10px;color:#888;text-align:center;margin-top:4px}
.char-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.char-right{flex:1;min-width:0}
.char-title{font-size:16px;font-weight:600;color:#111;margin-bottom:2px}
.char-desc{font-size:11px;color:#888;line-height:1.5;margin-bottom:8px}
.next-lbl{font-size:10px;color:#888;margin-bottom:3px}
.next-bg{height:5px;background:#fff;border-radius:3px;overflow:hidden}
.next-f{height:100%;background:#378ADD;border-radius:3px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.evo-row{display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem}
.evo-node{display:flex;flex-direction:column;align-items:center;gap:3px}
.evo-dot{width:9px;height:9px;border-radius:50%;background:#ddd;transition:background .3s}
.evo-dot.done{background:#378ADD}
.evo-dot.cur{background:#378ADD;box-shadow:0 0 0 3px #B5D4F4}
.evo-name{font-size:9px;color:#aaa;white-space:nowrap}
.evo-line{height:1px;flex:1;background:#ddd;margin-bottom:13px;max-width:26px}
.evo-line.done{background:#B5D4F4}

/* ── 称号3列 ── */
.title-box{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px;margin-bottom:1.25rem}
.title-cols{display:flex;gap:8px}
.title-col{flex:1;text-align:center}
.title-col-head{font-size:10px;color:#888;font-weight:600;margin-bottom:6px}
.badge{display:inline-block;padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid #ddd;background:#f5f5f0;color:#555;line-height:1.4;min-width:64px}
.badge.lv-high{background:#FFF8E6;border-color:#E8A000;color:#7A5500}
.badge.lv-mid{background:#E8F4FF;border-color:#378ADD;color:#154F90}
.badge.lv-low{background:#f5f5f0;border-color:#ddd;color:#777}
.badge-sub{font-size:9px;color:#bbb;margin-top:3px}

/* ── 月別グラフ ── */
.month-bars{display:flex;align-items:flex-end;gap:3px;height:80px;margin-bottom:6px}
.month-col{flex:1;display:flex;flex-direction:column;align-items:center}
.m-legend{display:flex;gap:14px;margin-bottom:1.25rem;flex-wrap:wrap}
.m-leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.m-leg-dot{width:8px;height:8px;border-radius:2px}

/* ── チャレンジ ── */
.challenge-box{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px;margin-bottom:1.25rem}
.ch-item{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:0.5px solid #f0f0ec}
.ch-item:last-child{border-bottom:none;padding-bottom:0}
.ch-icon{font-size:17px;flex-shrink:0;width:22px;text-align:center}
.ch-body{flex:1;min-width:0}
.ch-name{font-size:12px;font-weight:500;color:#333}
.ch-desc{font-size:10px;color:#bbb;margin-top:1px}
.ch-bar-bg{height:3px;background:#f0f0ec;border-radius:2px;margin-top:4px;overflow:hidden}
.ch-bar-f{height:100%;border-radius:2px;transition:width .4s}
.ch-pct{font-size:10px;color:#aaa;font-weight:600;flex-shrink:0;min-width:28px;text-align:right}

/* ── 月別称号まとめ ── */
.monthly-box{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:14px;margin-bottom:1.25rem}
.mo-row{padding:7px 0;border-bottom:0.5px solid #f0f0ec;display:flex;flex-direction:column;gap:3px}
.mo-row:last-child{border-bottom:none;padding-bottom:0}
.mo-month{font-size:10px;color:#bbb;font-weight:600}
.mo-name{font-size:13px;color:#333;font-weight:500;line-height:1.45}
.mo-name em{font-style:normal;font-weight:700}
.mo-name .r-h{color:#378ADD}
.mo-name .r-s{color:#E85D2F}
.mo-name .r-m{color:#1D9E75}
.mo-empty{font-size:12px;color:#ccc;text-align:center;padding:8px 0}

/* ── ポップアップ ── */
.lu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
.lu-overlay.show{opacity:1;pointer-events:auto}
.lu-box{background:#fff;border:2px solid #378ADD;border-radius:16px;padding:24px 28px;text-align:center;transform:scale(.8);transition:transform .4s cubic-bezier(.22,1,.36,1);max-width:280px;width:90%}
.lu-overlay.show .lu-box{transform:scale(1)}
.lu-img{width:110px;height:110px;object-fit:contain;image-rendering:pixelated;margin:0 auto 12px;display:block}
.lu-title{font-size:18px;font-weight:600;color:#111;margin-bottom:6px}
.lu-sub{font-size:12px;color:#888;line-height:1.6}
.lu-tap{font-size:11px;color:#bbb;margin-top:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0C447C;color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

  <!-- ① 日付 + 累計 -->
  <div class="topbar">
    <span class="dt" id="dt"></span>
    <span style="font-size:12px;color:#888" id="total-lbl">累計 0件</span>
  </div>
  <div id="sync-status" style="display:none;text-align:center;font-size:11px;color:#aaa;margin-bottom:6px">☁️ データを読み込み中...</div>
  <div class="xp-bg"><div class="xp-f" id="xp-f" style="width:0%"></div></div>

  <!-- ② 抱えてる件数 + 今日の完了 -->
  <div class="summary-row">
    <div class="summary-card">
      <div class="summary-num" id="total">0</div>
      <div class="summary-sub">件 抱えてる</div>
    </div>
    <div class="summary-card" style="text-align:right">
      <div class="summary-today" id="done-today">0</div>
      <div class="summary-sub">今日の完了</div>
    </div>
  </div>

  <!-- ③ 手配 / 仕掛 / 見積 カード -->
  <div class="cards">
    <div class="card">
      <div class="card-name">手配</div>
      <div class="card-num zero" id="n-h">0</div>
      <button class="cbtn btn-add" onclick="addH()">＋ 追加</button>
      <button class="cbtn btn-next" id="btn-ts" onclick="toS()" disabled>仕掛へ →</button>
    </div>
    <div class="card">
      <div class="card-name">仕掛</div>
      <div class="card-num zero" id="n-s">0</div>
      <div style="flex:1"></div>
      <button class="cbtn btn-done" id="btn-ds" onclick="doneS()" disabled>出荷完了</button>
    </div>
    <div class="card">
      <div class="card-name">見積</div>
      <div class="card-num zero" id="n-m">0</div>
      <button class="cbtn btn-add" onclick="addM()">＋ 追加</button>
      <button class="cbtn btn-done" id="btn-dm" onclick="doneM()" disabled>完了</button>
    </div>
  </div>

  <!-- キャラクター育成 -->
  <div class="divider"></div>
  <div class="sec-title">キャラクター育成</div>
  <div class="char-card">
    <div class="char-left">
      <img id="char-img" class="char-img" src="" alt="">
      <div class="char-stage-lbl" id="stage-lbl">段階 1/5</div>
    </div>
    <div class="char-right">
      <div class="char-title" id="char-title"></div>
      <div class="char-desc" id="char-desc"></div>
      <div class="next-lbl" id="next-lbl"></div>
      <div class="next-bg"><div class="next-f" id="next-f" style="width:0%"></div></div>
    </div>
  </div>
  <div class="evo-row" id="evo-row"></div>

  <!-- 称号（キャラと月別の間） -->
  <div class="divider"></div>
  <div class="sec-title">称号</div>
  <div class="title-box">
    <div class="title-cols">
      <div class="title-col">
        <div class="title-col-head">🔧 手配</div>
        <div class="badge lv-low" id="badge-h">—</div>
        <div class="badge-sub" id="badge-h-sub"></div>
      </div>
      <div class="title-col">
        <div class="title-col-head">📦 出荷</div>
        <div class="badge lv-low" id="badge-s">—</div>
        <div class="badge-sub" id="badge-s-sub"></div>
      </div>
      <div class="title-col">
        <div class="title-col-head">📝 見積</div>
        <div class="badge lv-low" id="badge-m">—</div>
        <div class="badge-sub" id="badge-m-sub"></div>
      </div>
    </div>
  </div>

  <!-- 月別グラフ -->
  <div class="divider"></div>
  <div class="sec-title">月別 完了件数（今年）</div>
  <div class="month-bars" id="month-bars"></div>
  <div class="m-legend">
    <div class="m-leg"><div class="m-leg-dot" style="background:#378ADD"></div>手配</div>
    <div class="m-leg"><div class="m-leg-dot" style="background:#E85D2F"></div>出荷</div>
    <div class="m-leg"><div class="m-leg-dot" style="background:#1D9E75"></div>見積</div>
  </div>

  <!-- チャレンジ -->
  <div class="divider"></div>
  <div class="sec-title">📋 チャレンジ</div>
  <div class="challenge-box" id="challenge-box"></div>

  <!-- 月別称号まとめ（一番下） -->
  <div class="divider"></div>
  <div class="sec-title">📜 月別 二つ名まとめ</div>
  <div class="monthly-box" id="monthly-box"></div>

</div>

<div class="lu-overlay" id="lu-overlay" onclick="closeLU()">
  <div class="lu-box">
    <img id="lu-img" class="lu-img" src="" alt="">
    <div class="lu-title" id="lu-title"></div>
    <div class="lu-sub" id="lu-sub"></div>
    <div class="lu-tap">タップして閉じる</div>
  </div>
</div>
<div class="toast" id="toast-el"></div>

// ===== 段階計算 =====
function getStageIdx(pt){
  const th=[0,5,15,40,100,150,200]; let i=0;
  for(let j=0;j<th.length;j++) if(pt>=th[j]) i=j;
  return i;
}
function getStagePct(pt){
  const th=[0,5,15,40,100,150,200,9999];
  const i=getStageIdx(pt);
  const c=th[i],nx=th[i+1];
  if(nx===9999) return 100;
  return Math.min(100,Math.round(((pt-c)/(nx-c))*100));
}

// ===== データ (Google Spreadsheet同期) =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzHd2gSGqciYw9eEx5flammjwe_HwaMTupzw4CrThxXxPkDcKkpmJj2CGNSqhMSRhzV/exec';

const EMPTY_STATE = ()=>({h:0,s:0,m:0,
  totalH:0,totalS:0,totalM:0,
  charPt:0,
  todayDone:0,lastDate:'',
  weekDone:0,weekStart:'',
  monthly:{}});

let S = EMPTY_STATE();
let _prevStage = -1;
let _saving = false;
let _pendingSave = false;

// ローカルにも保存（オフライン対策）
function saveLocal(){try{localStorage.setItem('tdotv5',JSON.stringify(S))}catch(e){}}
function loadLocal(){try{const r=localStorage.getItem('tdotv5');if(r)return JSON.parse(r)}catch(e){}return null;}

// GASへ保存（連続操作時は最後の1回だけ送る）
function save(){
  saveLocal();
  if(_saving){ _pendingSave=true; return; }
  _saving=true;
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',data:S})})
    .then(()=>{ _saving=false; if(_pendingSave){_pendingSave=false;save();} })
    .catch(()=>{ _saving=false; }); // 失敗してもローカルには保存済み
}

// GASからロード
async function load(){
  // まずローカルのデータで即座に画面表示
  const local = loadLocal();
  if(local){ S=local; checkReset(); render(); }
  else { setLoading(true); }

  try{
    const res = await fetch(GAS_URL+'?action=load');
    const json = await res.json();
    if(json.ok && json.data){
      S = json.data;
      saveLocal();
    } else if(!local){
      S = EMPTY_STATE();
    }
  } catch(e){
    // オフラインの場合はローカルデータをそのまま使用
    if(!local) S = EMPTY_STATE();
  }
  setLoading(false);
  checkReset();
  render();
}

function setLoading(on){
  const el = document.getElementById('sync-status');
  if(el) el.style.display = on ? 'block' : 'none';
}
function tod(){return new Date().toISOString().slice(0,10)}
function thisMonth(){return new Date().toISOString().slice(0,7)}
function getWeekStart(){
  const d=new Date(),day=d.getDay(),
    diff=d.getDate()-day+(day===0?-6:1);
  return new Date(new Date(d).setDate(diff)).toISOString().slice(0,10);
}

function checkReset(){
  const t=tod(), ws=getWeekStart();
  if(S.lastDate!==t){S.todayDone=0;S.lastDate=t;const mo=thisMonth();if(!S.monthly[mo])S.monthly[mo]={h:0,s:0,m:0};}
  if(!S.weekStart||S.weekStart!==ws){S.weekStart=ws;S.weekDone=0;}
  save();
}

    {icon:'📅',name:'今週20件完了',desc:`今週 ${S.weekDone||0}/20件`,cur:S.weekDone||0,max:20,color:'#378ADD'},
    {icon:'🔧',name:'今月 手配10件',desc:`${md.h}/10件`,cur:md.h,max:10,color:'#378ADD'},

// ===== ボタン処理 =====
function addH(){
  S.h++;
  S.totalH=(S.totalH||0)+1;  // 手配追加で+1pt
  S.charPt=(S.charPt||0)+1;
  save();render();
}
function toS(){
  if(S.h<=0)return;
  S.h--;S.s++;
  save();toast('仕掛へ移動');render();
}
function doneS(){
  if(S.s<=0)return;
  S.s--;
  S.totalS=(S.totalS||0)+1;  // 仕掛完了で+1pt
  S.charPt=(S.charPt||0)+1;
  S.todayDone++;
  if(!S.weekDone)S.weekDone=0; S.weekDone++;
  const mo=thisMonth();
  if(!S.monthly[mo])S.monthly[mo]={h:0,s:0,m:0};
  S.monthly[mo].s=(S.monthly[mo].s||0)+1;
  checkEvo();save();toast('出荷完了 ✓');render();
}
function addM(){S.m++;save();render()}
function doneM(){
  if(S.m<=0)return;
  S.m--;
  S.totalM=(S.totalM||0)+1;  // 見積完了で+1pt
  S.charPt=(S.charPt||0)+1;
  S.todayDone++;
  if(!S.weekDone)S.weekDone=0; S.weekDone++;
  const mo=thisMonth();
  if(!S.monthly[mo])S.monthly[mo]={h:0,s:0,m:0};
  S.monthly[mo].m=(S.monthly[mo].m||0)+1;
  checkEvo();save();toast('見積完了 ✓');render();
}

// ===== render =====
function render(){
  const d=new Date();
  const wd=['日','月','火','水','木','金','土'];
  document.getElementById('dt').textContent=
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日（'+wd[d.getDay()]+'）';

  const pt=S.charPt||0;
  const si=getStageIdx(pt);
  const pct=getStagePct(pt);
  const st=STAGES[si];
  _prevStage=si;

  // xpバー（charPtベース、100ptで満タン）
  document.getElementById('xp-f').style.width=Math.min(100,Math.round(pt/2))+'%';

  // 累計表示（手配追加+出荷完了+見積完了）
  const totalDone=(S.totalS||0)+(S.totalM||0);
  document.getElementById('total-lbl').textContent='累計 '+pt+'pt';
  document.getElementById('total').textContent=S.h+S.s+S.m;
  document.getElementById('done-today').textContent=S.todayDone;

  // カード
  const setNum=(id,n)=>{const e=document.getElementById(id);e.textContent=n;e.className='card-num'+(n===0?' zero':'')};
  setNum('n-h',S.h);setNum('n-s',S.s);setNum('n-m',S.m);
  document.getElementById('btn-ts').disabled=S.h<=0;
  document.getElementById('btn-ds').disabled=S.s<=0;
  document.getElementById('btn-dm').disabled=S.m<=0;

  // キャラ
  document.getElementById('char-img').src=IMGS[si];
  document.getElementById('char-title').textContent=st.title;
  document.getElementById('char-desc').textContent=st.desc;
  document.getElementById('stage-lbl').textContent='段階 '+(si+1)+'/5';
  document.getElementById('next-lbl').textContent=
    st.next<9999?'次の進化まで あと'+(st.next-pt)+'pt':'💀 限界突破！過労死寸前に到達...';
  document.getElementById('next-f').style.width=pct+'%';

  // 進化ツリー
  let html='';
  STAGES.forEach((_,i)=>{
    if(i>0) html+=`<div class="evo-line ${i<=si?'done':''}"></div>`;
    html+=`<div class="evo-node"><div class="evo-dot ${i<si?'done':i===si?'cur':''}"></div><div class="evo-name">${EVO_NAMES[i]}</div></div>`;
  });
  document.getElementById('evo-row').innerHTML=html;

  // 称号バッジ（3種）
  const rH=getRank(S.totalH||0, RANKS);
  const rS=getRank(S.totalS||0, SHIP_RANKS);
  const rM=getRank(S.totalM||0, RANKS);
  const setBadge=(id,subId,r,count)=>{
    const el=document.getElementById(id); el.textContent=r.name; el.className='badge '+r.cls;
    document.getElementById(subId).textContent=count+'件';
  };
  setBadge('badge-h','badge-h-sub',rH,S.totalH||0);
  setBadge('badge-s','badge-s-sub',rS,S.totalS||0);
  setBadge('badge-m','badge-m-sub',rM,S.totalM||0);

  // 月別グラフ
  const year=new Date().getFullYear();
  const months=Array.from({length:12},(_,i)=>year+'-'+String(i+1).padStart(2,'0'));
  const thisM=thisMonth();
  const allData=months.map(mo=>S.monthly[mo]||{h:0,s:0,m:0});
  const maxVal=Math.max(...allData.map(d=>(d.h||0)+(d.s||0)+(d.m||0)),1);
  const BH=68;
  document.getElementById('month-bars').innerHTML=months.map((mo,i)=>{
    const md=allData[i];
    const hh=Math.round(((md.h||0)/maxVal)*BH);
    const sh=Math.round(((md.s||0)/maxVal)*BH);
    const mh=Math.round(((md.m||0)/maxVal)*BH);
    const isCur=mo===thisM, op=isCur?'':'88';
    return`<div class="month-col">
      <div style="display:flex;align-items:flex-end;gap:1px;height:${BH}px">
        <div style="width:6px;height:${Math.max(md.h>0?2:0,hh)}px;background:#378ADD${op};border-radius:2px 2px 0 0"></div>
        <div style="width:6px;height:${Math.max(md.s>0?2:0,sh)}px;background:#E85D2F${op};border-radius:2px 2px 0 0"></div>
        <div style="width:6px;height:${Math.max(md.m>0?2:0,mh)}px;background:#1D9E75${op};border-radius:2px 2px 0 0"></div>
      </div>
      <div style="font-size:9px;color:#888;margin-top:3px;font-weight:${isCur?600:400}">${i+1}月</div>
    </div>`;
  }).join('');

  // チャレンジ
  document.getElementById('challenge-box').innerHTML=getChallenges().map(ch=>{
    const p=Math.min(100,Math.round((ch.cur/ch.max)*100));
    const done=ch.cur>=ch.max;
    return`<div class="ch-item">
      <div class="ch-icon">${ch.icon}</div>
      <div class="ch-body">
        <div class="ch-name" style="${done?'text-decoration:line-through;color:#bbb':''}">${ch.name}${done?' ✓':''}</div>
        <div class="ch-desc">${ch.desc}</div>
        <div class="ch-bar-bg"><div class="ch-bar-f" style="width:${p}%;background:${done?'#1D9E75':ch.color}"></div></div>
      </div>
      <div class="ch-pct">${p}%</div>
    </div>`;
  }).join('');

  // 月別称号まとめ（一番下）
  const moKeys=months.filter(mo=>{const md=S.monthly[mo];return md&&(md.h||md.s||md.m)});
  const moEl=document.getElementById('monthly-box');
  if(moKeys.length===0){
    moEl.innerHTML='<div class="mo-empty">まだ記録がありません</div>';
  } else {
    moEl.innerHTML=[...moKeys].reverse().map(mo=>{
      const md=S.monthly[mo];
      const rhN=getRank(md.h||0,RANKS).name;
      const rsN=getRank(md.s||0,SHIP_RANKS).name;
      const rmN=getRank(md.m||0,RANKS).name;
      const moLabel=mo.replace('-','/');
      return`<div class="mo-row">
        <div class="mo-month">${moLabel}</div>
        <div class="mo-name">手配<em class="r-h">${rhN}</em>・出荷<em class="r-s">${rsN}</em>・見積<em class="r-m">${rmN}</em>な${st.title}</div>
      </div>`;
    }).join('');
  }
}

load(); // GASからデータを読み込んで表示
</script>
</body>
</html>
